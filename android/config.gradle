ext {
    //Android编译SDK版本
    compileSdkVersion = 32
    //Android编译工具版本
    buildToolsVersion = "32.0.0"
    //Lib 最低适配Android 版本
    libMinSdkVersion = 21
    //APK 最低适配Android 版本
    appMinSdkVersion = 23
    //Android 最佳适配Android 版本
    targetSdkVersion = 30
    //版本号，正式版本会由自动构建替换
    versionCode = 240440
    //版本名，正式版本会由自动构建替换
    versionName = "4.4"
    //Android 构建包时是否混淆代码
    minifyEnabled = false

    // 所有的CPU 类型
    ndk_abiFilters_all = "armeabi,x86,x86_64,armeabi-v7a,arm64-v8a"
    // 当前项目支持的CPU类型
    ndk_abiFilters_project = "x86,x86_64,armeabi-v7a,arm64-v8a"
    // 项目使用到的so
    pickFirstList = ['libc++_shared.so']

    // 16KB 页面对齐配置
    pageAlignmentList = ['lib/armeabi-v7a/*.so', 'lib/arm64-v8a/*.so', 'lib/x86/*.so', 'lib/x86_64/*.so']

    excludeList = [
            'META-INF/*.kotlin_module',
            'META-INF/proguard/androidx-annotations.pro',
            'META-INF/proguard/coroutines.pro'
    ]

    //使用kotlin版本
    kotlin_version = '1.7.10'
}